<!DOCTYPE html>
<html>
<head>
    <title>{{ vps_id }} - Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body { 
            background: #000; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            color: #0f0; 
            font-family: monospace;
            /* Flexbox para gerenciar o layout da tela inteira */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header { 
            padding: 10px 20px; 
            font-weight: bold; 
            border-bottom: 1px dashed #0f0; 
            background: #0a0a0a;
            /* Impede o cabeçalho de ser esmagado */
            flex-shrink: 0; 
        }
        #terminal { 
            /* Faz a div do terminal crescer e ocupar 100% do espaço restante */
            flex-grow: 1; 
            width: 100%; 
            padding: 10px;
            box-sizing: border-box;
        }
        /* Ajuste fino para a barra de rolagem do xterm no tema escuro */
        .xterm .xterm-viewport { background-color: #000 !important; }
    </style>
</head>
<body>
    <div class="header">
        > root@crappy-lxc:~# lxc-attach -n {{ vps_id }}<br>
        <span style="color: yellow" id="status">> Negotiating WebSocket with {{ agent_url }}...</span>
    </div>
    
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script>
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000', foreground: '#00ff00' }
        });
        
        // Ativando o FitAddon
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        term.open(document.getElementById('terminal'));
        
        // Força o terminal a calcular o tamanho exato da tela na largada
        fitAddon.fit();
        
        // Se o usuário redimensionar a janela do navegador, o terminal recalcula as linhas/colunas
        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        term.write('Waiting for TTY allocation...\r\n');

        const socket = io("{{ agent_url }}", { transports: ["websocket"] });

        socket.on("connect", () => {
            document.getElementById('status').innerText = "> Connected! Shell established.";
            document.getElementById('status').style.color = "#00ff00";
            socket.emit("connect_vps", { vps_id: "{{ vps_id }}", token: "{{ token }}" });
        });

        socket.on("vps_output", (data) => {
            term.write(data.output);
        });

        term.onData((data) => {
            socket.emit("vps_input", { input: data });
        });

        socket.on("vps_closed", () => {
            term.write('\r\n\r\n[!] Connection closed by remote host.\r\n');
            document.getElementById('status').innerText = "> Connection terminated.";
            document.getElementById('status').style.color = "red";
        });

        socket.on("disconnect", () => {
            term.write('\r\n\r\n[!] Agent disconnected.\r\n');
        });
    </script>
</body>
</html>
