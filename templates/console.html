<!DOCTYPE html>
<html>
<head>
    <title>{{ vps_id }} - Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body { 
            background: #000; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            color: #0f0; 
            font-family: monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header { 
            padding: 10px 20px; 
            font-weight: bold; 
            border-bottom: 1px dashed #0f0; 
            background: #0a0a0a;
            flex-shrink: 0; 
        }
        #terminal { 
            flex-grow: 1; 
            width: 100%; 
            padding: 10px;
            box-sizing: border-box;
        }
        
        /* Oculta a barra de rolamento para o visual "Hacker" perfeito */
        .xterm .xterm-viewport::-webkit-scrollbar { 
            display: none; 
        }
        .xterm .xterm-viewport { 
            -ms-overflow-style: none;  /* IE e Edge */
            scrollbar-width: none;  /* Firefox */
            background-color: #000 !important; 
        }
    </style>
</head>
<body>
    <div class="header">
        > root@crappy-lxc:~# lxc-attach -n {{ vps_id }}<br>
        <span style="color: yellow" id="status">> Negotiating direct WebSocket with {{ agent_url }}...</span>
    </div>
    
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script>
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000', foreground: '#00ff00' }
        });
        
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        
        function resizeTerminal() {
            fitAddon.fit();
            if (socket && socket.connected) {
                socket.emit("resize", { cols: term.cols, rows: term.rows });
            }
        }

        window.addEventListener('resize', resizeTerminal);

        term.write('Waiting for TTY allocation...\r\n');

        // VOLTÁMOS AO MODO DIRETO: O teu Cloudflare prefere assim!
        const socket = io("{{ agent_url }}", { 
            transports: ["websocket"],
            secure: true
        });

        socket.on("connect_error", (err) => {
            console.error("Socket Connect Error:", err);
            document.getElementById('status').innerText = "> CONNECTION ERROR: " + err.message;
            document.getElementById('status').style.color = "red";
        });

        socket.on("connect", () => {
            document.getElementById('status').innerText = "> Connected! Shell established.";
            document.getElementById('status').style.color = "#00ff00";
            
            socket.emit("connect_vps", { vps_id: "{{ vps_id }}", token: "{{ token }}" });
            
            setTimeout(() => {
                resizeTerminal();
                term.focus();
            }, 800);
        });

        socket.on("vps_output", (data) => {
            term.write(data.output);
        });

        term.onData((data) => {
            socket.emit("vps_input", { input: data });
        });

        socket.on("vps_closed", () => {
            term.write('\r\n\r\n[!] Connection closed by remote host.\r\n');
            document.getElementById('status').innerText = "> Connection terminated.";
            document.getElementById('status').style.color = "red";
        });

        socket.on("disconnect", (reason) => {
            term.write(`\r\n\r\n[!] Agent disconnected. Reason: ${reason}\r\n`);
        });

        document.getElementById('terminal').addEventListener('click', () => {
            term.focus();
        });
    </script>
</body>
</html>
