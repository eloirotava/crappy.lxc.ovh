<!DOCTYPE html>
<html>
<head>
    <title>{{ vps_id }} - Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        body { background: #000; margin: 0; padding: 20px; overflow: hidden; color: #0f0; font-family: monospace; }
        #terminal { width: 100%; height: 85vh; padding-top: 10px; }
        .header { margin-bottom: 10px; font-weight: bold; border-bottom: 1px dashed #0f0; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        > root@crappy-lxc:~# lxc-attach -n {{ vps_id }}<br>
        <span style="color: yellow" id="status">> Negotiating WebSocket with {{ agent_url }}...</span>
    </div>
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <script>
        const term = new Terminal({
            cursorBlink: true,
            theme: { background: '#000000', foreground: '#00ff00' }
        });
        term.open(document.getElementById('terminal'));
        term.write('Waiting for TTY allocation...\r\n');

        const socket = io("{{ agent_url }}", { transports: ["websocket"] });

        socket.on("connect", () => {
            document.getElementById('status').innerText = "> Connected! Shell established.";
            socket.emit("connect_vps", { vps_id: "{{ vps_id }}", token: "{{ token }}" });
        });

        socket.on("vps_output", (data) => {
            term.write(data.output);
        });

        term.onData((data) => {
            socket.emit("vps_input", { input: data });
        });

        socket.on("vps_closed", () => {
            term.write('\r\n\r\n[!] Connection closed by remote host.\r\n');
            document.getElementById('status').innerText = "> Connection terminated.";
            document.getElementById('status').style.color = "red";
        });

        socket.on("disconnect", () => {
            term.write('\r\n\r\n[!] Agent disconnected.\r\n');
        });
    </script>
</body>
</html>
